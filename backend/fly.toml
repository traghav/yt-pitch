app = "yt-pitch-backend"
primary_region = "sin"
kill_signal = "SIGTERM"
kill_timeout = 30

[env]
  NODE_ENV = "production"
  PORT = "8080"
  YOUTUBE_COOKIE_FILE = "/data/youtube-cookies.txt"

[[mounts]]
  source = "yt_pitch_data"
  destination = "/data"
  initial_size = "1GB"
  snapshot_retention = 7

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50
